<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>San Roku Ku | Production Company</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="San Roku Ku is a production company working across film, television, documentaries, branded content, and creative development." />
    <link rel="canonical" href="https://sanrokuku.com/en/" />

    <script>
      (function () {
        var path = window.location.pathname;

        if (
          path === "/"
        ) {
          window.location.replace("/en/");
          return;
        }

        if (
          !path.startsWith("/en") &&
          !path.startsWith("/ja") &&
          !path.includes(".")
        ) {
          window.location.replace("/en" + path);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
